<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Conjugación de Verbos Rusos</title>
<link rel="stylesheet" href="conjugacion.css">
</head>

<body>
<button onclick="toggleDarkMode()">🌙 Modo oscuro</button>
<h1>Juego de Conjugación</h1>

<div>

<p class="ejemplo">
    Ejemplo de conjugación con el verbo "говорить":

    я говорю (yo hablo)<br>
    ты говоришь (tú hablas)<br>
    он говорит (él habla)<br>
    мы говорим (nosotros hablamos)<br>
    вы говорите (ustedes hablan)<br>
    они говорят (ellos hablan)
</p>

<p id="verbo"></p>
<p id="pronombre"></p>

<input id="respuesta" type="text" placeholder="Escribe la conjugación">

<button id="but" onclick="verificar()">Comprobar</button>

<p id="resultado"></p>

</div>

<script src="conjugacion.js"></script>

<button onclick="volver()">Volver</button>

</body>
</html>
